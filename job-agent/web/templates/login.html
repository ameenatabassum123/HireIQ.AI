<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - HireIQ.AI</title>
  <!-- Load React 18 & ReactDOM -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Load Babel Standalone -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #EEF0F8;
      overflow: hidden;
      height: 100vh;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .animate-blink { animation: blink 1s step-end infinite; }
    @keyframes fadeSlideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    input:focus {
      outline: none;
      border-color: #6366F1 !important;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12) !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.AUTH_ERROR = "{{ error or '' }}";
    window.AUTH_MESSAGE = "{{ message or '' }}";
    window.AUTH_NEXT = "{{ next or '' }}";
    window.AUTH_EMAIL = "{{ email or '' }}";
  </script>

  <script type="text/plain" id="auth-code">
    {% raw %}
    const { useState, useEffect, useRef } = React;

    const T = {
      ink: "#0F172A", muted: "#64748B", faint: "#94A3B8", white: "#fff",
      indigo: "#6366F1", indigoL: "#EEF2FF", violet: "#8B5CF6",
      cyan: "#06B6D4", emerald: "#10B981", amber: "#F59E0B", rose: "#F43F5E",
      g1: "linear-gradient(135deg,#6366F1,#8B5CF6)",
      navy: "#0A0F1E", navy2: "#0C1226",
    };

    const glass = (ex={}) => ({ background:"rgba(255,255,255,0.75)", border:"1px solid rgba(255,255,255,0.6)", backdropFilter:"blur(18px)", WebkitBackdropFilter:"blur(18px)", borderRadius:18, ...ex });

    // useTypewriter hook
    function useTypewriter(text, speed = 38, startDelay = 500) {
      const [displayed, setDisplayed] = useState("");
      const [done, setDone] = useState(false);
      useEffect(() => {
        setDisplayed(""); setDone(false);
        let i = 0; let interval;
        const to = setTimeout(() => {
          interval = setInterval(() => {
            i++;
            setDisplayed(text.slice(0, i));
            if (i >= text.length) { clearInterval(interval); setDone(true); }
          }, speed);
        }, startDelay);
        return () => { clearTimeout(to); clearInterval(interval); };
      }, [text, speed, startDelay]);
      return { displayed, done };
    }

    // Robot3D component
    function Robot3D() {
      const wrapRef = useRef(null);
      const headRef = useRef(null);
      const [tilt, setTilt] = useState({ x: 0, y: 0 });
      const [gaze, setGaze] = useState({ x: 0, y: 0 });

      useEffect(() => {
        const onMove = (e) => {
          const w = window.innerWidth, h = window.innerHeight;
          const x = ((e.clientX / w) - 0.5) * 16;
          const y = ((e.clientY / h) - 0.5) * -10;
          setTilt({ x: y, y: x });

          if (headRef.current) {
            const r = headRef.current.getBoundingClientRect();
            const cx = r.left + r.width / 2;
            const cy = r.top + r.height / 2;
            const dx = e.clientX - cx;
            const dy = e.clientY - cy;
            const dist = Math.min(Math.hypot(dx, dy), 400);
            const angle = Math.atan2(dy, dx);
            const maxPupil = 5;
            const pull = (dist / 400) * maxPupil;
            setGaze({ x: Math.cos(angle) * pull, y: Math.sin(angle) * pull });
          }
        };
        window.addEventListener("mousemove", onMove);
        return () => window.removeEventListener("mousemove", onMove);
      }, []);

      return (
        <div ref={wrapRef} style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", perspective: 1400, pointerEvents: "none" }}>
          <style>{`
            @keyframes botFloat { 0%,100%{ transform: translateY(0px); } 50%{ transform: translateY(-18px); } }
            @keyframes botBlink { 0%,92%,100%{ transform: scaleY(1); } 95%{ transform: scaleY(0.1); } }
            @keyframes ringSpin { from{ transform: rotateX(70deg) rotateZ(0deg); } to{ transform: rotateX(70deg) rotateZ(360deg); } }
            @keyframes ringSpin2 { from{ transform: rotateX(70deg) rotateZ(360deg); } to{ transform: rotateX(70deg) rotateZ(0deg); } }
            @keyframes glowPulse { 0%,100%{ opacity:0.45; } 50%{ opacity:0.85; } }
            @keyframes antennaPulse { 0%,100%{ box-shadow: 0 0 12px 4px rgba(139,92,246,0.7); } 50%{ box-shadow: 0 0 22px 8px rgba(99,102,241,0.95); } }
            @keyframes particleFloat { 0%{ transform: translate(0,0); opacity:0; } 10%{ opacity:1; } 90%{ opacity:1; } 100%{ transform: translate(var(--dx),var(--dy)); opacity:0; } }
          `}</style>
          <div style={{ position: "absolute", width: 480, height: 480, borderRadius: "50%", background: "radial-gradient(circle, rgba(99,102,241,0.35) 0%, rgba(139,92,246,0.15) 45%, transparent 75%)", filter: "blur(10px)", animation: "glowPulse 4s ease-in-out infinite" }} />
          <div style={{ position: "absolute", width: 340, height: 340, transformStyle: "preserve-3d" }}>
            <div style={{ position: "absolute", inset: 0, border: "1.5px solid rgba(139,92,246,0.35)", borderRadius: "50%", animation: "ringSpin 14s linear infinite", transformStyle: "preserve-3d" }} />
            <div style={{ position: "absolute", inset: 26, border: "1.5px solid rgba(99,102,241,0.3)", borderRadius: "50%", animation: "ringSpin2 10s linear infinite", transformStyle: "preserve-3d" }} />
          </div>
          {[...Array(8)].map((_, i) => {
            const angle = (i / 8) * Math.PI * 2;
            const dx = Math.cos(angle) * 60, dy = Math.sin(angle) * 60;
            return <div key={i} style={{
              position: "absolute", width: 5, height: 5, borderRadius: "50%",
              background: i % 2 ? T.violet : T.cyan,
              top: "50%", left: "50%",
              "--dx": `${dx}px`, "--dy": `${dy}px`,
              animation: `particleFloat ${3 + i * 0.4}s ease-in-out infinite`,
              animationDelay: `${i * 0.3}s`,
            }} />;
          })}
          <div style={{
            position: "relative", width: 220, height: 280,
            transformStyle: "preserve-3d",
            transform: `rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)`,
            transition: "transform 0.3s ease-out",
            animation: "botFloat 5s ease-in-out infinite",
          }}>
            <div style={{ position: "absolute", top: -28, left: "50%", transform: "translateX(-50%)", width: 4, height: 30, background: "linear-gradient(180deg,#6366F1,#8B5CF6)", borderRadius: 2 }} />
            <div style={{ position: "absolute", top: -38, left: "50%", transform: "translateX(-50%)", width: 12, height: 12, borderRadius: "50%", background: "radial-gradient(circle at 35% 35%, #C4B5FD, #8B5CF6)", animation: "antennaPulse 2s ease-in-out infinite" }} />
            <div ref={headRef} style={{
              position: "absolute", top: 0, left: "50%", width: 130, height: 100, transformStyle: "preserve-3d",
              transform: `translateX(-50%) rotateY(${gaze.x * 1.8}deg) rotateX(${-gaze.y * 1.8}deg)`,
              transition: "transform 0.15s ease-out",
            }}>
              <div style={{ position: "absolute", inset: 0, borderRadius: 28, background: "linear-gradient(135deg,#312E81,#1E1B4B)", transform: "translateZ(-14px)" }} />
              <div style={{ position: "absolute", inset: 0, borderRadius: 28, background: "linear-gradient(160deg,#EEF2FF 0%,#C7D2FE 55%,#A5B4FC 100%)", border: "1px solid rgba(99,102,241,0.4)", boxShadow: "0 18px 40px rgba(99,102,241,0.35), inset 0 2px 6px rgba(255,255,255,0.8)", transform: "translateZ(0px)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ width: 96, height: 44, borderRadius: 16, background: "linear-gradient(160deg,#0F172A,#1E1B4B)", display: "flex", alignItems: "center", justifyContent: "center", gap: 14, boxShadow: "inset 0 2px 8px rgba(0,0,0,0.5)" }}>
                  <div style={{ width: 18, height: 18, borderRadius: "50%", background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                    <div style={{
                      width: 14, height: 14, borderRadius: "50%",
                      background: "radial-gradient(circle at 35% 35%,#A5F3FC,#06B6D4)",
                      boxShadow: "0 0 10px rgba(6,182,212,0.8)",
                      animation: "botBlink 4s ease-in-out infinite",
                      transform: `translate(${gaze.x}px, ${gaze.y}px)`,
                      transition: "transform 0.12s ease-out",
                    }} />
                  </div>
                  <div style={{ width: 18, height: 18, borderRadius: "50%", background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                    <div style={{
                      width: 14, height: 14, borderRadius: "50%",
                      background: "radial-gradient(circle at 35% 35%,#A5F3FC,#06B6D4)",
                      boxShadow: "0 0 10px rgba(6,182,212,0.8)",
                      animation: "botBlink 4s ease-in-out infinite",
                      transform: `translate(${gaze.x}px, ${gaze.y}px)`,
                      transition: "transform 0.12s ease-out",
                    }} />
                  </div>
                </div>
              </div>
            </div>
            <div style={{ position: "absolute", top: 96, left: "50%", transform: "translateX(-50%)", width: 30, height: 14, background: "linear-gradient(180deg,#A5B4FC,#818CF8)", borderRadius: 4 }} />
            <div style={{ position: "absolute", top: 108, left: "50%", transform: "translateX(-50%)", width: 160, height: 130, transformStyle: "preserve-3d" }}>
              <div style={{ position: "absolute", inset: 0, borderRadius: 30, background: "linear-gradient(135deg,#312E81,#1E1B4B)", transform: "translateZ(-16px)" }} />
              <div style={{ position: "absolute", inset: 0, borderRadius: 30, background: "linear-gradient(160deg,#F8FAFC 0%,#E0E7FF 50%,#C7D2FE 100%)", border: "1px solid rgba(99,102,241,0.4)", boxShadow: "0 20px 44px rgba(99,102,241,0.3), inset 0 2px 6px rgba(255,255,255,0.9)", transform: "translateZ(0px)" }}>
                <div style={{ position: "absolute", top: 22, left: "50%", transform: "translateX(-50%)", width: 46, height: 46, borderRadius: "50%", background: "radial-gradient(circle at 35% 35%, #C4B5FD, #6366F1 60%, #4338CA)", boxShadow: "0 0 24px 6px rgba(99,102,241,0.6)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ width: 16, height: 16, borderRadius: "50%", background: "#fff", opacity: 0.9, animation: "glowPulse 2s ease-in-out infinite" }} />
                </div>
                <div style={{ position: "absolute", bottom: 18, left: 20, right: 20, height: 1, background: "rgba(99,102,241,0.25)" }} />
                <div style={{ position: "absolute", bottom: 10, left: 30, width: 8, height: 8, borderRadius: 2, background: T.cyan, opacity: 0.7 }} />
                <div style={{ position: "absolute", bottom: 10, left: 46, width: 8, height: 8, borderRadius: 2, background: T.violet, opacity: 0.7 }} />
              </div>
            </div>
            <div style={{ position: "absolute", top: 120, left: -14, width: 22, height: 76, borderRadius: 12, background: "linear-gradient(180deg,#A5B4FC,#818CF8)", transform: "rotateZ(8deg)", boxShadow: "0 8px 20px rgba(99,102,241,0.25)" }} />
            <div style={{ position: "absolute", top: 120, right: -14, width: 22, height: 76, borderRadius: 12, background: "linear-gradient(180deg,#A5B4FC,#818CF8)", transform: "rotateZ(-8deg)", boxShadow: "0 8px 20px rgba(99,102,241,0.25)" }} />
            <div style={{ position: "absolute", bottom: -30, left: "50%", transform: "translateX(-50%)", width: 150, height: 22, borderRadius: "50%", background: "radial-gradient(ellipse, rgba(99,102,241,0.35), transparent 70%)", filter: "blur(4px)" }} />
          </div>
        </div>
      );
    }

    // AuthScene component
    function AuthScene({ children }) {
      return (
        <div style={{ minHeight: "100vh", display: "flex", fontFamily: "'Inter','Segoe UI',system-ui,sans-serif", overflow: "hidden" }}>
          {/* LEFT Panel */}
          <div style={{ flex: 1, position: "relative", background: "linear-gradient(160deg,#0A0F1E 0%,#0C1226 55%,#11183A 100%)", display: "flex", flexDirection: "column", justifyContent: "space-between", padding: "44px 48px", minWidth: 0 }}>
            <div style={{ position: "absolute", width: 320, height: 320, borderRadius: "50%", background: T.indigo, opacity: 0.12, filter: "blur(70px)", top: "8%", left: "-8%", pointerEvents: "none" }} />
            <div style={{ position: "absolute", width: 280, height: 280, borderRadius: "50%", background: T.violet, opacity: 0.1, filter: "blur(70px)", bottom: "5%", right: "-6%", pointerEvents: "none" }} />

            {/* Logo */}
            <div style={{ position: "relative", zIndex: 2 }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#fff", letterSpacing: "-0.5px" }}>
                HireIQ<span style={{ background: T.g1, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>.AI</span>
              </div>
              <div style={{ fontSize: 8, color: "rgba(255,255,255,0.45)", marginTop: 4, letterSpacing: "0.2px", lineHeight: 1.3 }}>From Resume to Offer ---- Your Personal AI Carrer Copilot</div>
            </div>

            {/* Robot Stage */}
            <div style={{ position: "relative", flex: 1, minHeight: 320 }}>
              <Robot3D />
            </div>

            {/* Caption */}
            <div style={{ position: "relative", zIndex: 2, maxWidth: 380 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: T.violet, letterSpacing: "1px", marginBottom: 8 }}>MEET A.R.I.A.</div>
              <p style={{ fontSize: 15, color: "rgba(255,255,255,0.7)", lineHeight: 1.7 }}>
                Your Personal AI Career Copilot.<br />
                Upload your resume once. ARIA finds jobs, improves your ATS score, tailors applications, and drafts cover letters—helping you move from resume to offer, faster.
              </p>
            </div>
          </div>

          {/* RIGHT Panel */}
          <div style={{ width: 460, flexShrink: 0, background: "#EEF0F8", display: "flex", alignItems: "center", justifyContent: "center", padding: 32, position: "relative" }}>
            {children}
          </div>
        </div>
      );
    }

    // LOGIN PAGE
    function LoginPage() {
      const [email, setEmail] = useState(window.AUTH_EMAIL || "");
      const [password, setPassword] = useState("");
      const { displayed, done } = useTypewriter("Welcome back. Let's find your next role.", 32, 300);

      return (
        <AuthScene>
          <div style={{ ...glass({ padding: "36px 32px", width: "100%", maxWidth: 380, boxShadow: "0 20px 60px rgba(99,102,241,0.14)" }), animation: "fadeSlideUp 0.5s ease" }}>
            <div style={{ minHeight: 48, marginBottom: 14 }}>
              <span style={{ fontSize: 14, color: T.ink, fontWeight: 500, lineHeight: 1.4, display: "inline-block" }}>{displayed}</span>
              {!done && <span style={{ display: "inline-block", width: 2, height: 15, background: T.indigo, marginLeft: 2, verticalAlign: "text-bottom", animation: "blink 1s step-end infinite" }} />}
            </div>

            <h1 style={{ fontSize: 22, fontWeight: 800, color: T.ink, marginBottom: 24, letterSpacing: "-0.5px" }}>Log in</h1>

            {window.AUTH_ERROR && (
              <div style={{ padding: "11px 14px", background: "rgba(244,63,94,0.12)", border: "1px solid rgba(244,63,94,0.25)", borderRadius: 10, color: T.rose, fontSize: 13, fontWeight: 600, marginBottom: 20 }}>
                {window.AUTH_ERROR}
              </div>
            )}

            {window.AUTH_MESSAGE && (
              <div style={{ padding: "11px 14px", background: "rgba(16,185,129,0.12)", border: "1px solid rgba(16,185,129,0.25)", borderRadius: 10, color: T.emerald, fontSize: 13, fontWeight: 600, marginBottom: 20 }}>
                {window.AUTH_MESSAGE}
              </div>
            )}

            <form method="post" action="/login">
              {window.AUTH_NEXT && <input type="hidden" name="next" value={window.AUTH_NEXT} />}
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div>
                  <label htmlFor="email" style={{ display: "block", fontSize: 12, fontWeight: 600, color: T.ink, marginBottom: 6 }}>Email</label>
                  <input type="email" id="email" name="email" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} required
                    style={{ width: "100%", padding: "11px 14px", border: "1.5px solid rgba(15,23,42,0.1)", borderRadius: 10, fontSize: 14, fontFamily: "inherit", background: "rgba(255,255,255,0.9)", color: T.ink }} />
                </div>
                <div>
                  <label htmlFor="password" style={{ display: "block", fontSize: 12, fontWeight: 600, color: T.ink, marginBottom: 6 }}>Password</label>
                  <input type="password" id="password" name="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} required
                    style={{ width: "100%", padding: "11px 14px", border: "1.5px solid rgba(15,23,42,0.1)", borderRadius: 10, fontSize: 14, fontFamily: "inherit", background: "rgba(255,255,255,0.9)", color: T.ink }} />
                </div>
                <button type="submit" style={{ marginTop: 6, width: "100%", background: T.g1, color: "#fff", padding: "13px", borderRadius: 12, fontSize: 14, fontWeight: 700, border: "none", cursor: "pointer", boxShadow: "0 8px 28px rgba(99,102,241,0.36)" }}>
                  Log in →
                </button>
              </div>
            </form>

            <p style={{ textAlign: "center", fontSize: 13, color: T.muted, marginTop: 22 }}>
              No account?{" "}
              <a href="/signup" style={{ color: T.indigo, fontWeight: 700, cursor: "pointer", textDecoration: "none" }}>Sign up</a>
            </p>
          </div>
        </AuthScene>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LoginPage />);
    {% endraw %}
  </script>

  <!-- Loader compiler script using Babel Standalone manually -->
  <script>
    window.addEventListener('load', () => {
      try {
        const code = document.getElementById('auth-code').textContent;
        const transpiled = Babel.transform(code, {
          presets: [
            ['react', { runtime: 'classic' }],
            ['env', { modules: false }]
          ]
        }).code;
        
        const script = document.createElement('script');
        script.textContent = transpiled;
        document.body.appendChild(script);
        console.log("Authentication template compiled successfully!");
      } catch (err) {
        console.error("Authentication template compilation error:", err);
      }
    });
  </script>
</body>
</html>
